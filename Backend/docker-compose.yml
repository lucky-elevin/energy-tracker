volumes:
  db_data:

services:
  app:
    image: energytrackerbackend:latest
    build:
      context: .
    # 👉 ПРОСТО ГОВОРИМ ЧИТАТЬ ИЗ .ENV
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - '8080:8080'
    command: ["serve", "--env", "production", "--hostname", "0.0.0.0", "--port", "8080"]

  migrate:
    image: energytrackerbackend:latest
    build:
      context: .
    # 👉 ПРОСТО ГОВОРИМ ЧИТАТЬ ИЗ .ENV
    env_file:
      - .env
    depends_on:
      - db
    command: ["migrate", "--yes"]
    deploy:
      replicas: 0

  revert:
    image: energytrackerbackend:latest
    build:
      context: .
    # 👉 ПРОСТО ГОВОРИМ ЧИТАТЬ ИЗ .ENV
    env_file:
      - .env
    depends_on:
      - db
    command: ["migrate", "--revert", "--yes"]
    deploy:
      replicas: 0

  db:
    image: postgres:18-alpine
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5433:5432"
