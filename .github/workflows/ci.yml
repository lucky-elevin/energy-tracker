name: CI

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
      android: ${{ steps.filter.outputs.android }}
      backend: ${{ steps.filter.outputs.backend }}
      kmp: ${{ steps.filter.outputs.kmp }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: | 
            ios:
              - 'iOS/**'
            android:
              - 'Android/**'
            backend:
              - 'Backend/**'
            kmp:
              - 'kmp/**'  

  ios:
    name: iOS Build & Test (fast)
    needs: changes
    if: needs.changes.outputs.ios == 'true' || needs.changes.outputs.kmp == 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Developer/Xcode/DerivedData/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build & Test iOS
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISION_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
          IOS_PROVISION_WATCH_BASE64: ${{ secrets.IOS_PROVISION_WATCH_BASE64 }}
        run: |
          set -e

          # Clean bad simulators
          xcrun simctl delete unavailable || true

          TARGET_IOS="18"
          TARGET_WATCH="11"

          # Dynamically find the latest runtimes
          IOS_RUNTIME=$(xcrun simctl list runtimes --json | jq -r ".runtimes[] | select(.name | startswith(\"iOS $TARGET_IOS\")) | .identifier" | sort -V | tail -n 1)
          WATCH_RUNTIME=$(xcrun simctl list runtimes --json | jq -r ".runtimes[] | select(.name | startswith(\"watchOS $TARGET_WATCH\")) | .identifier" | sort -V | tail -n 1)

          # Updated to iPhone-16 because iPhone-15 is removed from this runner image
          PHONE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-16"
          WATCH_TYPE="com.apple.CoreSimulator.SimDeviceType.Apple-Watch-Series-9-45mm"

          # Create devices
          PHONE_ID=$(xcrun simctl create "CI_iPhone" $PHONE_TYPE $IOS_RUNTIME)
          WATCH_ID=$(xcrun simctl create "CI_Watch" $WATCH_TYPE $WATCH_RUNTIME)

          # Pair phone and watch
          xcrun simctl pair $WATCH_ID $PHONE_ID

          # Boot simulators
          xcrun simctl boot $PHONE_ID
          xcrun simctl boot $WATCH_ID || true

          # Wait for devices to finish booting
          xcrun simctl bootstatus $PHONE_ID -b
          xcrun simctl bootstatus $WATCH_ID -b || true

          cd iOS/Kaizen

          # Setup signing for AdHoc
          echo "$IOS_P12_BASE64" | base64 --decode > cert.p12
          echo "$IOS_PROVISION_BASE64" | base64 --decode > app.mobileprovision
          echo "$IOS_PROVISION_WATCH_BASE64" | base64 --decode > watch.mobileprovision

          # Create and link keychain properly
          security create-keychain -p "" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          # Import the certificate
          security import cert.p12 -k build.keychain -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

          # DEBUG: Verify identities in keychain
          echo "=== AVAILABLE IDENTITIES IN KEYCHAIN ==="
          security find-identity -v -p codesigning build.keychain
          echo "========================================"

          # Copy provisioning profiles
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp app.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          cp watch.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

          # Run unit tests
          xcodebuild \
            -project Kaizen.xcodeproj \
            -scheme Kaizen \
            -destination "platform=iOS Simulator,id=$PHONE_ID" \
            -parallel-testing-enabled YES \
            -only-testing:KaizenTests \
            test

          # Archive staging build
          xcodebuild \
            -project Kaizen.xcodeproj \
            -scheme Kaizen \
            -configuration Staging \
            -destination "generic/platform=iOS" \
            -archivePath build/Kaizen.xcarchive \
            DEVELOPMENT_TEAM=${{ secrets.DEVELOPMENT_TEAM }} \
            CODE_SIGN_STYLE=Manual \
            archive

          # Create export options plist
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>release-testing</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.YauheniLevin.Kaizen.staging</key>
                  <string>Kaizen_stage_CI</string>
                  <key>com.YauheniLevin.Kaizen.staging.watchkitapp</key>
                  <string>Profile-kaizen-watch-stage</string>
              </dict>
          </dict>
          </plist>
          EOF

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath build/Kaizen.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: iOS/Kaizen/build/*.ipa
      - name: Upload iOS to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          groups: qa-team
          file: iOS/Kaizen/build/Kaizen.ipa
  android:
    name: Android Build
    needs: changes
    if: needs.changes.outputs.android == 'true' || needs.changes.outputs.kmp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android Staging
        run: |
          cd Android/Kaizen
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload Android to Firebase Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with: 
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          groups: qa-team
          file: Android/Kaizen/app/build/outputs/apk/debug/app-debug.apk
  backend:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run backend tests
        run: |
          cd Backend && swift test